name: ✨ Nueva Funcionalidad
description: Proponer una mejora o nueva capacidad del pipeline
title: "[FEAT] <descripción breve>"
labels: ["enhancement"]
body:
  - type: dropdown
    id: pipeline-stage
    attributes:
      label: Etapa del Pipeline
      description: ¿A qué tarea pertenece esta mejora?
      options:
        - "Tarea 1: Ingesta y Segmentación"
        - "Tarea 2: Extracción Atómica (CoT)"
        - "Tarea 3: Merging del Grafo"
        - "Tarea 4: Dataset de Evaluación"
        - "Tarea 5: Interfaz SPARQL"
        - "Tarea 6: Ejecución y Evaluación"
        - "Tarea 7: Diagnóstico de Fallos"
        - "Tarea 8: Refinamiento Iterativo"
        - "Infraestructura / CI-CD"
        - "Documentación"
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivación
      description: ¿Qué problema resuelve esta funcionalidad?
      placeholder: "Actualmente el chunker no respeta los saltos de sección cuando..."
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Propuesta de Solución
      description: Describe cómo implementarías esta mejora
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternativas Consideradas
      description: Otras aproximaciones que hayas descartado

  - type: dropdown
    id: priority
    attributes:
      label: Prioridad
      options:
        - "🔴 Alta — Bloquea el pipeline"
        - "🟡 Media — Mejora significativa"
        - "🟢 Baja — Nice to have"
    validations:
      required: true
