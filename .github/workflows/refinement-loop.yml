name: 🔁 Bucle de Refinamiento (Manual)

on:
  workflow_dispatch:
    inputs:
      threshold:
        description: "Umbral mínimo de aciertos para terminar el loop (0.0 - 1.0)"
        required: true
        default: "0.85"
      max_iterations:
        description: "Número máximo de iteraciones del bucle"
        required: true
        default: "5"
      graphdb_endpoint:
        description: "Endpoint de GraphDB"
        required: true
        default: "http://localhost:7200/repositories/kg-pipeline"

jobs:
  refinement-loop:
    name: 🔁 Ejecutar Bucle de Refinamiento
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Ejecutar agente de refinamiento
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          GRAPHDB_ENDPOINT: ${{ github.event.inputs.graphdb_endpoint }}
        run: |
          python src/8_refinement/agent.py \
            --loop \
            --threshold ${{ github.event.inputs.threshold }} \
            --max-iterations ${{ github.event.inputs.max_iterations }} \
            --golden-set data/golden_set/ \
            --ontology-dir ontologies/ \
            --log-output logs/refinement_$(date +%Y%m%d_%H%M%S).json

      - name: Subir log de iteraciones
        uses: actions/upload-artifact@v4
        with:
          name: refinement-logs
          path: logs/
          retention-days: 30
